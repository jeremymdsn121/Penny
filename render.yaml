# Render Blueprint — one-click deploy of the Penny API + web app + marketing site.
#
# Usage: in the Render dashboard, New > Blueprint, point it at this repo. Render
# reads this file, creates the services, and prompts for every env var marked
# `sync: false` (the secrets — never commit those). The Python version is pinned
# by backend/.python-version.
#
# The public (non-secret) URLs below are pinned to the canonical poweredbypenny.com
# hosts — api on api.poweredbypenny.com, app on app.poweredbypenny.com. Custom
# domains are declared on the services (`domains:`); after a deploy, add the matching
# DNS records the Render dashboard shows (CNAME app -> penny-web's onrender host).
# See DEPLOYMENT.md sections 4b + 4c for the cutover checklist.

services:
  # ---- Backend API (FastAPI) ----------------------------------------------
  - type: web
    name: penny-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      # --- Supabase (required) ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # --- App secrets ---
      - key: SECRET_KEY
        generateValue: true
      - key: CONSENT_SECRET
        generateValue: true
      # Shared secret for the unattended scan cron. Point a Render Cron Job at
      # POST /api/v1/cron/run-scans with header X-Cron-Secret: <this value>.
      - key: CRON_SECRET
        generateValue: true
      # This service's own public origin (consent links, absolute URLs).
      - key: PUBLIC_BASE_URL
        value: https://api.poweredbypenny.com
      # Public origin of the frontend, for the calendar OAuth redirect-back.
      - key: FRONTEND_BASE_URL
        value: https://app.poweredbypenny.com
      # Comma-separated extra CORS origins the browser app is served from.
      - key: EXTRA_CORS_ORIGINS
        value: https://app.poweredbypenny.com
      # --- AI (required for extraction, chat, compliance, doc generation) ---
      - key: ANTHROPIC_API_KEY
        sync: false
      # --- Optional integrations (leave blank to no-op the feature) ---
      - key: OPENAI_API_KEY          # Whisper voice-memo transcription
        sync: false
      - key: SENDGRID_API_KEY        # outbound email
        sync: false
      - key: SENDGRID_FROM_EMAIL     # verified SendGrid sender
        sync: false
      - key: SENDGRID_WEBHOOK_KEY    # inbound-parse + event webhook auth (?key=)
        sync: false
      - key: RENTCAST_API_KEY        # comparable sales
        sync: false
      - key: TWILIO_ACCOUNT_SID      # WhatsApp / SMS
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: TWILIO_SMS_FROM
        sync: false

  # ---- Unattended scans (cron) --------------------------------------------
  # Runs every 15 minutes: POSTs to the API's /cron/run-scans, which loops every
  # brokerage and fires the deadline-reminder + scheduled-reply scans (both
  # idempotent). CRON_SECRET is pulled from penny-api so the generated value
  # matches on both sides — no manual copy. Without this job, reminders and
  # scheduled-reply resurfacing only run from the dashboard dev buttons.
  - type: cron
    name: penny-cron-scans
    runtime: python
    rootDir: backend
    plan: starter
    schedule: "*/15 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_cron_scans.py
    envVars:
      - key: CRON_SECRET
        fromService:
          type: web
          name: penny-api
          envVarKey: CRON_SECRET
      # The API's public endpoint. Override if the API origin differs.
      - key: CRON_TARGET_URL
        value: https://api.poweredbypenny.com/api/v1/cron/run-scans

  # ---- Frontend (static Vite build) ---------------------------------------
  # Served at app.poweredbypenny.com. After the first deploy, add the CNAME the
  # Render dashboard shows (penny-web > Settings > Custom Domains) at the registrar
  # so the cert issues — see DEPLOYMENT.md section 4c.
  - type: web
    name: penny-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    domains:
      - app.poweredbypenny.com
    envVars:
      # Point at the API's public origin + /api/v1. Vite inlines this at build
      # time, so changing it requires a redeploy of this static site.
      - key: VITE_API_BASE_URL
        value: https://api.poweredbypenny.com/api/v1
    routes:
      # SPA fallback — every path serves index.html so client-side routing works.
      - type: rewrite
        source: /*
        destination: /index.html

  # ---- Marketing site (static HTML — apex domain) -------------------------
  # Plain multi-page static site (landing, pricing, privacy, terms). No build
  # step — the files in marketing/ are served as-is, so privacy.html and
  # terms.html resolve at the site root. The A2P 10DLC campaign's Privacy +
  # Terms URLs (poweredbypenny.com/privacy.html, /terms.html) point here, so
  # this service must stay publicly reachable. After the first deploy, attach
  # the apex domain in the Render dashboard (penny-marketing > Settings >
  # Custom Domains) — see DEPLOYMENT.md section 4b. No SPA rewrite here: we want
  # literal file serving so /privacy.html and /terms.html are served verbatim.
  - type: web
    name: penny-marketing
    runtime: static
    rootDir: marketing
    buildCommand: "true"
    staticPublishPath: .
